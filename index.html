<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Manager</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #222633;
      --border: #2a2f3d;
      --text: #e8eaed;
      --text-muted: #8b92a5;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --success: #22c55e;
      --success-muted: rgba(34, 197, 94, 0.15);
      --danger: #ef4444;
      --danger-muted: rgba(239, 68, 68, 0.15);
      --priority-high: #f87171;
      --priority-medium: #fbbf24;
      --priority-low: #60a5fa;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    .app {
      max-width: 640px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--text) 0%, var(--accent-hover) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--text-muted);
      margin-top: 0.5rem;
      font-size: 0.95rem;
    }

    .task-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
      margin-bottom: 2rem;
    }

    .task-form h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-end;
    }

    .form-group {
      flex: 1 1 130px;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .form-group-btn {
      flex: 0 0 auto;
      display: flex;
      align-items: flex-end;
    }

    .form-group-btn .label-spacer {
      display: none;
    }

    .form-group label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    .form-group input,
    .form-group select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 0.65rem 0.85rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input[type="date"] {
      color-scheme: dark;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    .form-group input::placeholder {
      color: var(--text-muted);
      opacity: 0.6;
    }

    .btn-add {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.65rem 1.5rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
      min-height: 42px;
    }

    .btn-add:hover {
      background: var(--accent-hover);
    }

    .btn-add:active {
      transform: scale(0.98);
    }

    .task-list-section h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 1rem;
    }

    .task-count {
      font-weight: 400;
      color: var(--text-muted);
      opacity: 0.7;
    }

    .progress-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 1.25rem;
    }

    .progress-label {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 0.65rem;
    }

    .progress-track {
      height: 8px;
      background: var(--bg);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--success));
      border-radius: 999px;
      width: 0%;
      transition: width 0.35s ease;
    }

    .task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: border-color 0.2s, background 0.2s;
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .task-item:hover {
      background: var(--surface-hover);
    }

    .task-item.completed {
      opacity: 0.55;
    }

    .task-item.completed .task-name {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .priority-badge {
      flex-shrink: 0;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.25rem 0.55rem;
      border-radius: 6px;
    }

    .priority-high {
      background: rgba(248, 113, 113, 0.15);
      color: var(--priority-high);
    }

    .priority-medium {
      background: rgba(251, 191, 36, 0.15);
      color: var(--priority-medium);
    }

    .priority-low {
      background: rgba(96, 165, 250, 0.15);
      color: var(--priority-low);
    }

    .task-content {
      flex: 1;
      min-width: 0;
    }

    .task-name {
      font-size: 0.95rem;
      font-weight: 500;
      word-break: break-word;
    }

    .task-due-date {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }

    .task-due-date.overdue {
      color: var(--danger);
    }

    .task-actions {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .btn {
      border: none;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.45rem 0.85rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-complete {
      background: var(--success-muted);
      color: var(--success);
    }

    .btn-complete:hover {
      background: rgba(34, 197, 94, 0.25);
    }

    .btn-complete.done {
      background: rgba(34, 197, 94, 0.25);
      cursor: default;
      opacity: 0.7;
    }

    .btn-delete {
      background: var(--danger-muted);
      color: var(--danger);
    }

    .btn-delete:hover {
      background: rgba(239, 68, 68, 0.25);
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1.5rem;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    .empty-state svg {
      width: 48px;
      height: 48px;
      margin-bottom: 1rem;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Project Manager</h1>
      <p>Organize your tasks and stay on track</p>
    </header>

    <form class="task-form" id="taskForm">
      <h2>Add New Task</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="taskName">Task Name</label>
          <input
            type="text"
            id="taskName"
            placeholder="What needs to be done?"
            required
            autocomplete="off"
          >
        </div>
        <div class="form-group">
          <label for="taskPriority">Priority</label>
          <select id="taskPriority">
            <option value="High">High</option>
            <option value="Medium" selected>Medium</option>
            <option value="Low">Low</option>
          </select>
        </div>
        <div class="form-group">
          <label for="taskDueDate">Due Date</label>
          <input type="date" id="taskDueDate" required>
        </div>
        <div class="form-group form-group-btn">
          <button type="submit" class="btn-add">Add Task</button>
        </div>
      </div>
    </form>

    <section class="task-list-section">
      <h2>Tasks <span class="task-count" id="taskCount"></span></h2>
      <div class="progress-section">
        <p class="progress-label" id="progressLabel">0 of 0 tasks completed</p>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
      <ul class="task-list" id="taskList"></ul>
    </section>
  </div>

  <script>
    const STORAGE_KEY = "projectManagerTasks";
    const taskForm = document.getElementById("taskForm");
    const taskNameInput = document.getElementById("taskName");
    const taskPrioritySelect = document.getElementById("taskPriority");
    const taskDueDateInput = document.getElementById("taskDueDate");
    const taskList = document.getElementById("taskList");
    const taskCount = document.getElementById("taskCount");
    const progressLabel = document.getElementById("progressLabel");
    const progressFill = document.getElementById("progressFill");

    let tasks = [];
    let nextId = 1;

    const priorityClass = {
      High: "priority-high",
      Medium: "priority-medium",
      Low: "priority-low",
    };

    function loadTasks() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return;

        const data = JSON.parse(saved);
        tasks = data.tasks || [];
        nextId = data.nextId || 1;
      } catch {
        tasks = [];
        nextId = 1;
      }
    }

    function saveTasks() {
      localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify({ tasks, nextId })
      );
    }

    function formatDueDate(dateStr) {
      const date = new Date(dateStr + "T00:00:00");
      return date.toLocaleDateString("en-US", {
        month: "short",
        day: "numeric",
        year: "numeric",
      });
    }

    function isOverdue(dateStr, completed) {
      if (completed) return false;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const due = new Date(dateStr + "T00:00:00");
      return due < today;
    }

    function renderProgress() {
      const total = tasks.length;
      const completed = tasks.filter((t) => t.completed).length;
      const percent = total === 0 ? 0 : (completed / total) * 100;

      progressLabel.textContent =
        total === 0
          ? "0 of 0 tasks completed"
          : `${completed} of ${total} task${total === 1 ? "" : "s"} completed`;
      progressFill.style.width = `${percent}%`;
    }

    function renderTasks() {
      taskCount.textContent = tasks.length ? `(${tasks.length})` : "";
      renderProgress();

      if (tasks.length === 0) {
        taskList.innerHTML = `
          <li class="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15a2.25 2.25 0 012.15 1.586m-5.8 0c-.376.023-.75.05-1.124.072C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z" />
            </svg>
            <p>No tasks yet. Add one above to get started.</p>
          </li>
        `;
        return;
      }

      taskList.innerHTML = tasks
        .map(
          (task) => `
          <li class="task-item ${task.completed ? "completed" : ""}" data-id="${task.id}">
            <span class="priority-badge ${priorityClass[task.priority]}">${task.priority}</span>
            <div class="task-content">
              <span class="task-name">${escapeHtml(task.name)}</span>
              <div class="task-due-date ${isOverdue(task.dueDate, task.completed) ? "overdue" : ""}">
                Due: ${formatDueDate(task.dueDate)}
              </div>
            </div>
            <div class="task-actions">
              <button
                class="btn btn-complete ${task.completed ? "done" : ""}"
                data-action="complete"
                data-id="${task.id}"
                ${task.completed ? "disabled" : ""}
              >
                ${task.completed ? "Done" : "Complete"}
              </button>
              <button class="btn btn-delete" data-action="delete" data-id="${task.id}">
                Delete
              </button>
            </div>
          </li>
        `
        )
        .join("");
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function addTask(name, priority, dueDate) {
      tasks.push({
        id: nextId++,
        name: name.trim(),
        priority,
        dueDate,
        completed: false,
      });
      saveTasks();
      renderTasks();
    }

    function toggleComplete(id) {
      const task = tasks.find((t) => t.id === id);
      if (task) {
        task.completed = true;
        saveTasks();
        renderTasks();
      }
    }

    function deleteTask(id) {
      tasks = tasks.filter((t) => t.id !== id);
      saveTasks();
      renderTasks();
    }

    taskForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const name = taskNameInput.value;
      const priority = taskPrioritySelect.value;
      const dueDate = taskDueDateInput.value;

      if (!name.trim() || !dueDate) return;

      addTask(name, priority, dueDate);
      taskForm.reset();
      taskPrioritySelect.value = "Medium";
      taskNameInput.focus();
    });

    taskList.addEventListener("click", (e) => {
      const button = e.target.closest("button[data-action]");
      if (!button) return;

      const id = Number(button.dataset.id);
      const action = button.dataset.action;

      if (action === "complete") toggleComplete(id);
      if (action === "delete") deleteTask(id);
    });

    loadTasks();
    renderTasks();
  </script>
</body>
</html>
